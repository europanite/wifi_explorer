name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-test-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend test image
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t local/frontend-test:ci \
            frontend

      - name: Save images for downstream jobs
        run: |
          docker save local/frontend-test:ci | gzip > frontend-test.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: test-images
          path: |
            frontend-test.tar.gz

  frontend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs: build-test-images
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: test-images
      - name: Load images
        run: |
          gunzip -c frontend-test.tar.gz | docker load
      - name: Run frontend tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm frontend_test
