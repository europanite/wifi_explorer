name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend/app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Verify Android bundle export
        run: npx expo export --platform android

  docker-compose-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose files
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.test.yml config

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t local/frontend-test:ci frontend

      - name: Verify container can install and typecheck
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm frontend sh -lc '
            set -e
            cd /app
            npm ci
            npm run typecheck
          '
